name: Notify blog

# Tell takeokunn/blog to bump its theme submodule as soon as main moves.
# Requires the BLOG_DISPATCH_TOKEN secret: a fine-grained PAT for takeokunn/blog
# with "Contents: read and write" permission (used only to send repository_dispatch).
# Without the secret this workflow is skipped - the blog still syncs via its daily cron.

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to takeokunn/blog
        env:
          TOKEN: ${{ secrets.BLOG_DISPATCH_TOKEN }}
        if: env.TOKEN != ''
        run: |
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/takeokunn/blog/dispatches \
            -d '{"event_type":"theme-updated","client_payload":{"sha":"${{ github.sha }}"}}'
