<footer class="footer">
    {{ with .Site.Params.social }}
    <div class="footer_social-icons">
        {{ partial "social-icons-inline" . }}
    </div>
    {{ end }}
    <small class="footer_copyright">
        <span>© {{ now.Format "2006" }} {{ or .Site.Params.copyright .Site.Params.author.name .Site.Title }}</span>
        <span class="footer_divider" aria-hidden="true">•</span>
        <span>Powered by <a href="https://github.com/takeokunn/hugo-take-theme" target="_blank" rel="noopener noreferrer">hugo-take-theme</a></span>
    </small>
</footer>
